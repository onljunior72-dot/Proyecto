name: SteamOS Ultimate Cloud

on:
  workflow_dispatch:

jobs:
  steamos:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Update system
      run: |
        sudo apt update

    # -----------------------------
    # DOCKER
    # -----------------------------
    - name: Install Docker
      run: |
        sudo apt install -y docker.io
        sudo systemctl start docker

    # -----------------------------
    # START WEBTOP (Desktop Linux)
    # -----------------------------
    - name: Start Webtop
      run: |
        docker run -d \
          --name webtop \
          --privileged \
          -e PUID=1000 \
          -e PGID=1000 \
          -e TZ=UTC \
          -p 3000:3000 \
          -v webtop_data:/config \
          lscr.io/linuxserver/webtop:ubuntu-kde

    - name: Wait container
      run: sleep 25

    # -----------------------------
    # BASE SYSTEM
    # -----------------------------
    - name: Install Base Packages
      run: |
        docker exec webtop bash -c "
        apt update
        apt install -y flatpak wget curl mangohud gamescope
        flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        "

    # -----------------------------
    # AUTO APP SYSTEM (/proot/apps)
    # -----------------------------
    - name: Create App System
      run: |
        docker exec webtop bash -c '

        mkdir -p /proot/apps
        mkdir -p /usr/local/bin/cloudapps

cat > /usr/local/bin/cloudapps/install <<EOF
#!/bin/bash

APP=\$1

case \$APP in

steam)
 flatpak install -y flathub com.valvesoftware.Steam
 ;;

heroic)
 flatpak install -y flathub com.heroicgameslauncher.hgl
 ;;

lutris)
 flatpak install -y flathub net.lutris.Lutris
 ;;

retroarch)
 flatpak install -y flathub org.libretro.RetroArch
 ;;

discord)
 flatpak install -y flathub com.discordapp.Discord
 ;;

*)
 echo "App no soportada"
 ;;

esac
EOF

chmod +x /usr/local/bin/cloudapps/install
'

    # -----------------------------
    # INSTALL STEAM
    # -----------------------------
    - name: Install Steam
      run: |
        docker exec webtop bash -c "
        flatpak install -y flathub com.valvesoftware.Steam
        "

    # -----------------------------
    # STEAMOS AUTO BOOT
    # -----------------------------
    - name: SteamOS Boot Mode
      run: |
        docker exec webtop bash -c '

        mkdir -p /root/.config/autostart

cat > /root/.config/autostart/steamos.desktop <<EOF
[Desktop Entry]
Type=Application
Name=SteamOS
Exec=gamescope -f -w 1280 -h 800 -- steam -gamepadui
X-GNOME-Autostart-enabled=true
EOF
'

    # -----------------------------
    # AUTO LOGIN STEAM
    # -----------------------------
    - name: Steam Auto Login
      run: |
        docker exec webtop bash -c '

        mkdir -p /root/.steam

cat > /root/.steam/steam_dev.cfg <<EOF
BootStrapperInhibitAll=enable
ForceLoginOnStartup=1
EOF
'

    # -----------------------------
    # CLOUD OPTIMIZATION
    # -----------------------------
    - name: Cloud Gaming Optimization
      run: |
        docker exec webtop bash -c "

        echo 'export vblank_mode=0' >> /etc/profile
        echo 'export DXVK_ASYNC=1' >> /etc/profile
        echo 'export __GL_SYNC_TO_VBLANK=0' >> /etc/profile
        "

    # -----------------------------
    # KEEP RUNNER ALIVE
    # -----------------------------
    - name: Keep Alive
      run: |
        echo 'SteamOS Cloud Running...'
        while true; do
          sleep 300
        done
